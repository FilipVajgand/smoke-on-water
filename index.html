<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Pearl Bubble Effect</title>
  </head>
  <body>
    <canvas id="pearl-canvas"></canvas>
    <button
      id="controls-toggle"
      class="controls-toggle"
      type="button"
      aria-controls="controls-panel"
      aria-expanded="true"
      title="Hide controls"
    >
      <span aria-hidden="true"></span>
    </button>

    <main id="controls-panel" class="panel" aria-label="Pearl bubble controls">
      <div class="panel-top">
        <h1>Pearl field</h1>
        <label class="file-button" for="image-file">Image</label>
        <input id="image-file" type="file" accept="image/*,video/*" />
      </div>

      <section class="control-section">
        <h2>Field</h2>
        <label class="slider">
          <span>Density</span>
          <input id="density" type="range" min="2" max="10" step="1" value="4" />
        </label>
        <label class="slider">
          <span>Size</span>
          <input id="size" type="range" min="1" max="9" step="0.05" value="3.8" />
        </label>
        <label class="slider">
          <span>Color</span>
          <input id="pearl-tint" type="range" min="0" max="2" step="0.01" value="1.25" />
        </label>
        <label class="slider">
          <span>Spread</span>
          <input id="separation" type="range" min="30" max="150" step="1" value="72" />
        </label>
        <label class="slider">
          <span>Cursor</span>
          <input id="cursor-area" type="range" min="0.01" max="2.4" step="0.01" value="0.24" />
        </label>
      </section>

      <section class="control-section">
        <h2>Source</h2>
        <label class="select">
          <span>Style</span>
          <select id="effect-style">
            <option value="silk">Silk</option>
            <option value="energy" selected>Energy</option>
            <option value="smoke">Smoke</option>
          </select>
        </label>
        <label class="toggle">
          <span>Warp</span>
          <input id="image-warp" type="checkbox" checked />
        </label>
        <label class="toggle">
          <span>Fade</span>
          <input id="image-fade" type="checkbox" checked />
        </label>
        <label class="slider">
          <span>Hold</span>
          <input id="reveal-hold" type="range" min="0.25" max="4" step="0.05" value="0.4" />
        </label>
        <label class="slider">
          <span>Reveal</span>
          <input id="reveal-depth" type="range" min="0" max="2" step="0.01" value="2" />
        </label>
        <label class="slider">
          <span>Smoke</span>
          <input id="smoke" type="range" min="0" max="1.6" step="0.01" value="0.16" />
        </label>
        <label class="slider">
          <span>Smooth</span>
          <input id="smoothness" type="range" min="0" max="8" step="0.01" value="8" />
        </label>
        <label class="toggle">
          <span>Arc glow</span>
          <input id="arc-glow" type="checkbox" checked />
        </label>
        <label class="slider">
          <span>Arc power</span>
          <input id="pulse-scale" type="range" min="0" max="4" step="0.05" value="1.8" />
        </label>
        <label class="slider">
          <span>Glow</span>
          <input id="glow-scale" type="range" min="0" max="4" step="0.01" value="1" />
        </label>
        <label class="slider">
          <span>Opacity</span>
          <input id="glow-opacity" type="range" min="0" max="4" step="0.01" value="1" />
        </label>
        <label class="color-control">
          <span>Color</span>
          <input id="glow-color" type="color" value="#8eefff" aria-label="Glow color" />
        </label>
      </section>

      <details class="control-section advanced-section">
        <summary>Advanced</summary>
        <label class="toggle">
          <span>Mask pearls</span>
          <input id="pearl-mask-reveal" type="checkbox" />
        </label>
        <label class="toggle">
          <span>Filter</span>
          <input id="filter-overlay" type="checkbox" />
        </label>
        <label class="toggle">
          <span>Global haze</span>
          <input id="global-composite" type="checkbox" />
        </label>
        <label class="toggle">
          <span>Frost</span>
          <input id="global-frost" type="checkbox" checked />
        </label>
        <label class="toggle">
          <span>RGB split</span>
          <input id="global-rgb" type="checkbox" checked />
        </label>
        <label class="toggle">
          <span>Bloom</span>
          <input id="global-bloom" type="checkbox" checked />
        </label>
        <label class="toggle">
          <span>Streaks</span>
          <input id="global-streaks" type="checkbox" checked />
        </label>
        <label class="toggle">
          <span>Corners</span>
          <input id="global-corners" type="checkbox" checked />
        </label>
        <label class="toggle">
          <span>Grain</span>
          <input id="global-grain" type="checkbox" checked />
        </label>
        <label class="toggle">
          <span>Fluid</span>
          <input id="global-fluid" type="checkbox" checked />
        </label>
        <label class="toggle">
          <span>Debug</span>
          <input id="debug" type="checkbox" />
        </label>
      </details>
    </main>

    <div id="debug-labels" class="debug-labels" aria-hidden="true" hidden>
      <span>mask</span>
      <span>velocity</span>
      <span>energy</span>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
