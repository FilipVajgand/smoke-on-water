<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Pearl Bubble Effect</title>
  </head>
  <body>
    <canvas id="pearl-canvas"></canvas>
    <button
      id="controls-toggle"
      class="controls-toggle"
      type="button"
      aria-controls="controls-panel"
      aria-expanded="true"
      title="Hide controls"
    >
      <span aria-hidden="true"></span>
    </button>

    <main id="controls-panel" class="panel" aria-label="Pearl bubble controls">
      <div class="panel-top">
        <h1>Pearl field</h1>
        <label class="file-button" for="image-file">Image</label>
        <input id="image-file" type="file" accept="image/*,video/*" />
      </div>

      <label class="toggle">
        <span>Filter</span>
        <input id="filter-overlay" type="checkbox" checked />
      </label>
      <label class="slider">
        <span>Density</span>
        <input id="density" type="range" min="2" max="10" step="1" value="4" />
      </label>
      <label class="slider">
        <span>Size</span>
        <input id="size" type="range" min="1" max="9" step="0.05" value="3.8" />
      </label>
      <label class="slider">
        <span>Spread</span>
        <input id="separation" type="range" min="30" max="150" step="1" value="72" />
      </label>
      <label class="slider">
        <span>Cursor</span>
        <input id="cursor-area" type="range" min="0.01" max="2.4" step="0.01" value="0.05" />
      </label>
      <label class="slider">
        <span>Smoke</span>
        <input id="smoke" type="range" min="0" max="1.6" step="0.01" value="0.52" />
      </label>
      <label class="slider">
        <span>Smooth</span>
        <input id="smoothness" type="range" min="0" max="2" step="0.01" value="1.2" />
      </label>
      <label class="slider">
        <span>Pulse</span>
        <input id="pulse-scale" type="range" min="0" max="4" step="0.05" value="1.05" />
      </label>
      <label class="slider">
        <span>Glow</span>
        <input id="glow-scale" type="range" min="0" max="4" step="0.01" value="1.35" />
      </label>
      <label class="toggle">
        <span>Debug</span>
        <input id="debug" type="checkbox" />
      </label>
    </main>

    <div id="debug-labels" class="debug-labels" aria-hidden="true" hidden>
      <span>mask</span>
      <span>velocity</span>
      <span>reveal</span>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
